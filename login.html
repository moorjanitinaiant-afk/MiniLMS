<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#020617;
color:white;
}

.login-box{
width:400px;
margin:auto;
margin-top:120px;
background:#1e293b;
padding:40px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="login-box">

<h3>Login</h3>

<form method="post">

{% csrf_token %}

<input name="username"
class="form-control mb-3"
placeholder="Username">

<input type="password"
name="password"
class="form-control mb-3"
placeholder="Password">

<button class="btn btn-primary w-100">
Login
</button>

</form>

<a href="/register/">Register</a>

</div>

</body>

</html>
