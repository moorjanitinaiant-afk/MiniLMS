<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">

<style>

body{
background:#0f172a;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.register-box{
width:420px;
background:#1e293b;
padding:40px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.register-box h2{
text-align:center;
margin-bottom:25px;
color:#f1f5f9;
}

input{
background:#334155 !important;
border:none !important;
color:white !important;
}

input::placeholder{
color:#cbd5f5;
}

</style>

</head>

<body>

<div class="register-box">

<h2>Student Register</h2>

<form method="post">

{% csrf_token %}

{{ form.as_p }}

<button class="btn btn-success w-100 mt-3">
Register
</button>

</form>

</div>

</body>

</html>
