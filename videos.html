{% extends 'base.html' %}

{% block content %}

<h2>Videos</h2>

{% for video in videos %}

<div class="card p-4 mb-4">

<h4>{{video.title}}</h4>

<iframe width="100%" height="400"
src="{{video.get_embed_url}}"
frameborder="0"
allowfullscreen>
</iframe>

</div>

{% endfor %}

{% endblock %}
